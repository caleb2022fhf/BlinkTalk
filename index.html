<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BlinkTalk - Login</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 60px 0 30px;
      font-size: 3.5rem;
      text-shadow: 0 0 15px rgba(255,255,255,0.4);
      letter-spacing: 3px;
    }

    .container {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px 50px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.37);
      border: 1px solid rgba(255,255,255,0.18);
      margin-bottom: 40px;
    }

    .hidden {
      display: none;
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-size: 1.1rem;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.25);
      color: white;
      outline: none;
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    input:focus {
      background: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 25px 0 15px;
      background: #00d4ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    button:hover {
      background: #00b7e0;
      transform: translateY(-2px);
    }

    .switch-link {
      text-align: center;
      margin-top: 20px;
      color: #a0d8ff;
      cursor: pointer;
    }

    .switch-link:hover {
      color: white;
      text-decoration: underline;
    }

    .info {
      margin-top: auto;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>BlinkTalk</h1>

  <div class="container" id="loginSection">
    <form id="loginForm">
      <label for="netid">Net ID</label>
      <input type="text" id="netid" placeholder="Enter your Net ID" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />

      <button type="submit">Submit / Log In</button>
    </form>

    <div class="switch-link" onclick="showCreate()">Create Account →</div>
  </div>

  <div class="container hidden" id="createSection">
    <form id="createForm">
      <label for="new-netid">New Net ID</label>
      <input type="text" id="new-netid" placeholder="Choose your Net ID" required />

      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="Choose a strong password" required />

      <button type="submit">Create Account</button>
    </form>

    <div class="switch-link" onclick="showLogin()">← Back to Login</div>
  </div>

  <div class="info">
    Use shortcuts:<br>
    Ctrl + Alt + D → focus Net ID<br>
    Ctrl + Alt + P → focus Password<br>
    Ctrl + L → show Login page<br>
    Ctrl + C → show Create account
  </div>

  <script>
    // Show/hide sections (single-page "navigation")
    function showLogin() {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('createSection').classList.add('hidden');
    }

    function showCreate() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('createSection').classList.remove('hidden');
    }

    // Keyboard shortcuts (working in modern browsers)
    document.addEventListener('keydown', function(e) {
      // Ctrl + Alt + D → focus Net ID
      if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'd') {
        e.preventDefault();
        document.getElementById('netid').focus();
      }

      // Ctrl + Alt + P → focus Password
      if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'p') {
        e.preventDefault();
        document.getElementById('password').focus();
      }

      // Ctrl + L → show login
      if (e.ctrlKey && !e.altKey && !e.shiftKey && e.key.toLowerCase() === 'l') {
        e.preventDefault();
        showLogin();
      }

      // Ctrl + C → show create account
      if (e.ctrlKey && !e.altKey && !e.shiftKey && e.key.toLowerCase() === 'c') {
        e.preventDefault();
        showCreate();
      }
    });

    // Fake form submit (just demo alert)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Logging in with Net ID: ' + document.getElementById('netid').value);
    });

    document.getElementById('createForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Creating account with Net ID: ' + document.getElementById('new-netid').value);
    });
  </script>

</body>
</html>
